<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raj Marketing · Premium Mosquito Nets · Mysore Since 2012</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            /* Primary Colors */
            --primary-blue: #1e4b8b;
            --primary-blue-light: #2a6bb3;
            --primary-blue-dark: #123a6b;
            --secondary-gold: #e6b422;
            --secondary-gold-light: #f5c542;
            --secondary-gold-dark: #d4a31e;
            
            /* Status Colors */
            --success-green: #28a745;
            --success-green-light: #5cb85c;
            --danger-red: #dc3545;
            --danger-red-light: #ff6b6b;
            --warning-orange: #fd7e14;
            --info-cyan: #17a2b8;
            --purple: #6f42c1;
            --pink: #e83e8c;
            --indigo: #6610f2;
            --teal: #20c997;
            
            /* Grayscale */
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            
            /* Background */
            --body-bg: #1a2c2d;
            --card-bg: #ffffff;
            
            /* Shadows */
            --shadow-sm: 0 5px 15px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.15);
            --shadow-xl: 0 30px 60px rgba(0,0,0,0.2);
            --shadow-2xl: 0 40px 80px rgba(0,0,0,0.25);
            
            /* Gradients */
            --gradient-blue: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-light));
            --gradient-gold: linear-gradient(135deg, var(--secondary-gold), var(--secondary-gold-light));
            --gradient-green: linear-gradient(135deg, #28a745, #5cb85c);
            --gradient-purple: linear-gradient(135deg, #6f42c1, #8a5cd9);
            --gradient-pink: linear-gradient(135deg, #e83e8c, #f0659e);
            --gradient-orange: linear-gradient(135deg, #fd7e14, #ff9f4b);
            --gradient-cyan: linear-gradient(135deg, #17a2b8, #5dc1d9);
            --gradient-red: linear-gradient(135deg, #dc3545, #ff6b6b);
            
            /* Border Radius */
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 25px;
            --radius-xl: 35px;
            --radius-xxl: 50px;
            --radius-circle: 50%;
            
            /* Transitions */
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        body {
            background-color: var(--body-bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0 0 20px 0;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 390px;
            width: 100%;
            background: linear-gradient(145deg, #f5faf8 0%, #e8f0ed 100%);
            box-shadow: var(--shadow-2xl);
            border-radius: 36px 36px 0 0;
            margin: 8px 0 0 0;
            overflow: hidden;
            position: relative;
            padding-bottom: 70px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== CUSTOM SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gradient-gold);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gradient-blue);
        }

        /* ===== ULTIMATE HEADER ===== */
        .top-header {
            height: 70px;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--secondary-gold);
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .hamburger-icon {
            font-size: 24px;
            color: var(--primary-blue);
            cursor: pointer;
            transition: var(--transition-normal);
            background: rgba(30,75,139,0.1);
            padding: 10px;
            border-radius: var(--radius-sm);
            position: relative;
            overflow: hidden;
        }

        .hamburger-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .hamburger-icon:hover::before {
            width: 100px;
            height: 100px;
        }

        .hamburger-icon:hover {
            background: var(--gradient-blue);
            color: white;
            transform: rotate(90deg);
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .business-name {
            font-size: 18px;
            font-weight: 800;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
            position: relative;
        }

        .business-name::after {
            content: '⭐';
            position: absolute;
            top: -10px;
            right: -20px;
            font-size: 12px;
            animation: starTwinkle 2s infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .business-location {
            font-size: 10px;
            color: var(--secondary-gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .notification-icon, .cart-icon, .admin-icon {
            font-size: 22px;
            cursor: pointer;
            transition: var(--transition-normal);
            position: relative;
        }

        .notification-icon {
            color: var(--secondary-gold);
            animation: ring 4s infinite;
        }

        @keyframes ring {
            0% { transform: rotate(0); }
            2% { transform: rotate(15deg); }
            4% { transform: rotate(-15deg); }
            6% { transform: rotate(10deg); }
            8% { transform: rotate(-10deg); }
            10% { transform: rotate(5deg); }
            12% { transform: rotate(0); }
            100% { transform: rotate(0); }
        }

        .cart-icon { color: var(--success-green); }
        .admin-icon { color: var(--primary-blue); }

        .notification-icon:hover, .cart-icon:hover, .admin-icon:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger-red);
            color: white;
            font-size: 9px;
            padding: 3px 6px;
            border-radius: 50%;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ===== DROPDOWN MENU ===== */
        .dropdown-menu {
            position: fixed;
            top: 70px;
            left: -300px;
            width: 280px;
            height: calc(100% - 70px);
            background: white;
            z-index: 2000;
            transition: left var(--transition-bounce);
            box-shadow: var(--shadow-2xl);
            border-radius: 0 40px 40px 0;
            padding: 20px 0;
            overflow-y: auto;
            border-right: 4px solid var(--secondary-gold);
        }

        .dropdown-menu.active {
            left: 0;
        }

        .menu-header {
            padding: 25px;
            background: var(--gradient-blue);
            color: white;
            border-radius: 0 40px 0 0;
            position: relative;
            overflow: hidden;
        }

        .menu-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .menu-header h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .menu-header p {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .menu-header i {
            color: var(--secondary-gold);
            margin-right: 8px;
        }

        .menu-items {
            list-style: none;
            padding: 0 15px;
        }

        .menu-items li {
            margin-bottom: 5px;
            transform: translateX(0);
            transition: transform var(--transition-normal);
        }

        .menu-items li:hover {
            transform: translateX(10px);
        }

        .menu-items li a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            border-radius: var(--radius-sm);
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .menu-items li a::before {
            content: '';
            position: absolute;
            left: -100%;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .menu-items li a:hover::before {
            left: 100%;
        }

        .menu-items li a i {
            width: 25px;
            color: var(--secondary-gold);
            font-size: 1.1rem;
            transition: var(--transition-normal);
        }

        .menu-items li a:hover {
            background: var(--gradient-blue);
            color: white;
        }

        .menu-items li a:hover i {
            color: white;
            transform: scale(1.2);
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1500;
            display: none;
            backdrop-filter: blur(5px);
        }

        .menu-overlay.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        /* ===== LIVE COUNTER ===== */
        .live-counter {
            background: rgba(30,75,139,0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xxl);
            padding: 15px 20px;
            margin: 15px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid var(--secondary-gold);
            position: relative;
            overflow: hidden;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 10px rgba(230,180,34,0.3); }
            50% { box-shadow: 0 0 25px rgba(230,180,34,0.6); }
            100% { box-shadow: 0 0 10px rgba(230,180,34,0.3); }
        }

        .live-counter::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--secondary-gold), transparent 60%);
            animation: rotate 4s linear infinite;
            opacity: 0.1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .counter-left {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .counter-left i {
            color: var(--secondary-gold);
            font-size: 1.3rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .counter-text {
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .counter-numbers {
            display: flex;
            gap: 15px;
            position: relative;
            z-index: 2;
        }

        .today-count {
            background: var(--gradient-blue);
            color: white;
            padding: 6px 16px;
            border-radius: var(--radius-xxl);
            font-weight: 800;
            box-shadow: 0 5px 15px rgba(30,75,139,0.3);
        }

        .total-count {
            background: rgba(230,180,34,0.2);
            color: var(--secondary-gold);
            padding: 6px 16px;
            border-radius: var(--radius-xxl);
            font-weight: 800;
            border: 2px solid var(--secondary-gold);
        }

        /* ===== MAIN SLIDER ===== */
        .main-slider {
            width: 100%;
            height: 220px;
            margin: 10px 0 20px;
            padding: 0 16px;
            position: relative;
        }

        .main-slider .swiper {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-lg);
        }

        .main-slider .swiper-slide {
            background-size: cover;
            background-position: center;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg);
            border: 3px solid rgba(255,255,255,0.3);
        }

        .main-slider .swiper-slide::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 1;
        }

        .slide-content {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            z-index: 2;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: slideInUp 0.5s ease;
        }

        @keyframes slideInUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .slide-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: white;
            display: block;
            margin-bottom: 5px;
        }

        .slide-content small {
            display: block;
            font-size: 0.8rem;
            opacity: 0.95;
        }

        .swiper-pagination {
            position: absolute;
            bottom: 10px !important;
        }

        .swiper-pagination-bullet {
            width: 10px;
            height: 10px;
            background: white;
            opacity: 0.7;
            transition: var(--transition-normal);
        }

        .swiper-pagination-bullet-active {
            background: var(--secondary-gold);
            width: 25px;
            border-radius: 10px;
            opacity: 1;
        }

        /* ===== LIVE TICKER - FIREBASE INTEGRATED ===== */
        .live-ticker {
            background: white;
            margin: 8px 16px 20px;
            border-radius: var(--radius-xxl);
            padding: 16px 0;
            border: 3px solid var(--primary-blue);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-lg);
        }

        .live-ticker::before {
            content: '🔴 LIVE';
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--danger-red);
            color: white;
            padding: 6px 15px;
            border-radius: var(--radius-xxl);
            font-size: 12px;
            font-weight: 800;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(220,53,69,0.3);
            animation: pulseLive 2s infinite;
        }

        @keyframes pulseLive {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.05); }
            100% { transform: translateY(-50%) scale(1); }
        }

        .ticker-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            padding: 0 20px 0 110px;
        }

        .ticker-content {
            display: inline-block;
            animation: ticker 45s linear infinite;
            color: var(--gray-900);
            font-weight: 600;
            font-size: 0.95rem;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-content:hover {
            animation-play-state: paused;
        }

        .ticker-content span {
            margin-right: 50px;
            display: inline-block;
            padding: 5px 15px;
            background: rgba(30,75,139,0.03);
            border-radius: var(--radius-xxl);
        }

           .ticker-content i {
            color: var(--success-green);
            margin-right: 8px;
            font-size: 0.8rem;
            animation: blinkGreen 1.2s infinite;
        }

        @keyframes blinkGreen {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .ticker-customer { color: var(--success-green); font-weight: 800; }
        .ticker-area { color: var(--secondary-gold); font-weight: 800; }
        .ticker-service { color: var(--primary-blue); font-weight: 800; }

        /* ===== QUICK STATS GRID - FIREBASE INTEGRATED ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0 16px 20px;
        }

        .stat-item {
            background: white;
            border-radius: var(--radius-md);
            padding: 15px 8px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: var(--transition-normal);
            border: 2px solid transparent;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .stat-item:nth-child(1) { animation-delay: 0.1s; }
        .stat-item:nth-child(2) { animation-delay: 0.2s; }
        .stat-item:nth-child(3) { animation-delay: 0.3s; }
        .stat-item:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-item:hover {
            transform: translateY(-5px);
            border-color: var(--secondary-gold);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            transition: var(--transition-normal);
        }

        .stat-item:hover .stat-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .stat-icon.visitor { background: var(--gradient-purple); }
        .stat-icon.call { background: var(--gradient-green); }
        .stat-icon.booking { background: var(--gradient-orange); }
        .stat-icon.order { background: var(--gradient-cyan); }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary-blue);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--gray-600);
            font-weight: 500;
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 15px;
        }

        .section-title h2 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary-blue);
            position: relative;
            padding-left: 15px;
        }

        .section-title h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 20px;
            background: var(--secondary-gold);
            border-radius: var(--radius-xxl);
        }

        .view-all {
            color: var(--secondary-gold);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 15px;
            background: rgba(230,180,34,0.1);
            border-radius: var(--radius-xxl);
            transition: var(--transition-normal);
        }

        .view-all:hover {
            background: var(--gradient-gold);
            color: var(--primary-blue);
            transform: translateX(5px);
        }

        /* ===== CATEGORY SLIDER ===== */
        .category-slider {
            padding: 0 16px 20px;
        }

        .category-slider .swiper-slide {
            width: 120px;
        }

        .category-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: var(--transition-normal);
            border: 2px solid transparent;
        }

        .category-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--secondary-gold);
            box-shadow: var(--shadow-lg);
        }

        .category-image {
            height: 100px;
            background-size: cover;
            background-position: center;
            transition: var(--transition-normal);
        }

        .category-card:hover .category-image {
            transform: scale(1.1);
        }

        .category-card span {
            display: block;
            padding: 12px;
            text-align: center;
            font-weight: 700;
            color: var(--primary-blue);
            background: white;
        }

        /* ===== FEATURED PRODUCTS SLIDER ===== */
        .featured-slider {
            padding: 0 16px 20px;
        }

        .featured-slider .swiper-slide {
            width: 280px;
        }

        .product-card {
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transition: var(--transition-normal);
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--secondary-gold);
            box-shadow: var(--shadow-xl);
        }

        .product-image {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .product-card:hover .product-image::after {
            left: 150%;
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gradient-gold);
            color: var(--primary-blue);
            padding: 5px 15px;
            border-radius: var(--radius-xxl);
            font-weight: 800;
            font-size: 0.75rem;
            z-index: 2;
            box-shadow: var(--shadow-sm);
        }

        .product-info { 
            padding: 18px; 
        }

        .product-info h4 { 
            color: var(--primary-blue); 
            font-size: 1.1rem; 
            margin-bottom: 8px;
            font-weight: 700;
        }

        .product-price { 
            color: var(--secondary-gold); 
            font-size: 1.2rem; 
            font-weight: 800;
            margin-bottom: 12px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: var(--radius-xxl);
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before, .btn-secondary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-primary:hover::before, .btn-secondary:hover::before {
            width: 100px;
            height: 100px;
        }

        .btn-primary {
            background: var(--gradient-blue);
            color: white;
        }

        .btn-secondary {
            background: white;
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
